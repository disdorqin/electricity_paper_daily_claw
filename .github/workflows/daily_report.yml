name: Daily Electricity Paper Report v2.0

on:
  # 每天 UTC 00:00 运行 = 北京时间 08:00
  schedule:
    - cron: "0 0 * * *"
  # 允许手动触发，方便测试
  workflow_dispatch:

permissions:
  contents: write  # 允许上传图片到仓库 assets 目录

jobs:
  generate-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily report v2.0
        env:
          AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SENSENOVA_API_KEY: ${{ secrets.SENSENOVA_API_KEY }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
          PUSHBOT_URL: ${{ secrets.PUSHBOT_URL }}
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          NOTIFY_CHANNELS: ${{ secrets.NOTIFY_CHANNELS }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: python daily_report.py

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: electricity-daily-report-v2
          path: |
            electricity_daily/*.md
            assets/**/*.png
            assets/**/*.jpg
            assets/**/*.jpeg
